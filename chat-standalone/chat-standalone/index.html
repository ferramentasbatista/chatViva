<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat VivAI - Standalone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="chatFloatButton" class="chat-float-button position-fixed bottom-0 end-0">
        <span class="d-flex align-items-center gap-1 text-white">
            <svg xmlns="http://www.w3.org/2000/svg" width="25" height="25" viewBox="0 0 1381.68 1358.57" role="img" aria-label="Ícone de chat">
                <path fill="currentColor" d="M1314.65,652.56c0-344.52-279.29-623.8-623.81-623.8S67,308,67,652.56c0,178.47,75.07,339.3,195.2,453l-.35.24c275.83,260.23,684.3,292.42,992.82,103.36l-118.46-120C1246.55,976.63,1314.65,822.58,1314.65,652.56ZM932.12,943.32a395.6,395.6,0,0,1-487.56-1.68,25.33,25.33,0,1,1,31.33-39.8,345.09,345.09,0,0,0,425.22,1.43,25.33,25.33,0,1,1,31,40.05Z" />
            </svg>
            Chat
        </span>
    </button>

    <div id="chatModalOverlay" class="modal fade show d-block chat-modal-overlay" style="display: none;">
        <div class="modal-dialog modal-dialog-end chat-modal-container" role="dialog" aria-modal="true" aria-labelledby="chatModalTitle">
            <div class="modal-content shadow-lg rounded-4 border-0 chat-modal-content">
                <div class="modal-header bg-gradient-danger rounded-top-4 border-0 py-3">
                    <div class="d-flex align-items-center">
                        <div class="chat-avatar me-3"><img src="https://incentivoviva.vivaexperiencias.com.br/assets/icons/icon-72x72.png" alt="Logo Viva! Experiências" width="40" height="40"></div>
                        <div>
                            <h5 id="chatModalTitle" class="modal-title mb-0 fw-bold">VivAI</h5>
                            <small>Atendimento IA</small>
                        </div>
                    </div>
                    <button type="button" class="btn-close opacity-75 btn-close-chat" aria-label="Close" id="closeChatButton">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div class="modal-body p-0">
                    <div id="userDataForm" class="user-data-form p-4">
                        <div class="text-center mb-4">
                            <h6 class="fw-bold text-dark mb-2">Informe seus dados para o atendimento</h6>
                            <p class="text-muted mb-0">Para iniciarmos o chat, precisamos de algumas informações:</p>
                        </div>

                        <form id="userForm">
                            <div class="row">
                                <div class="col-12 mb-3">
                                    <label for="nome" class="form-label">Primeiro nome</label>
                                    <input type="text" id="nome" name="nome" class="form-control border-left-0" placeholder="Informe seu primeiro nome" autocomplete="name" required autofocus />
                                    <div id="nomeError" class="text-danger small mt-1" style="display: none;">Primeiro nome é obrigatório</div>
                                </div>

                                <div class="col-12 mb-3">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" id="email" name="email" class="form-control border-left-0" placeholder="Informe seu e-mail" autocomplete="username email" required />
                                    <div id="emailError" class="text-danger small mt-1" style="display: none;">
                                        <span id="emailRequiredError" style="display: none;">E-mail é obrigatório</span>
                                        <span id="emailFormatError" style="display: none;">E-mail deve ter um formato válido</span>
                                    </div>
                                </div>

                                <div class="col-12 mb-3">
                                    <label for="telefone" class="form-label">Telefone</label>
                                    <input type="text" id="telefone" name="telefone" class="form-control border-left-0" placeholder="(00) 00000-0000" autocomplete="tel" required maxlength="15" />
                                    <div id="telefoneError" class="text-danger small mt-1" style="display: none;">Telefone é obrigatório</div>
                                </div>

                                <div class="col-12">
                                    <div class="d-grid mb-0 text-center">
                                        <button class="btn btn-brand submit-btn mt-2" type="submit" id="submitUserDataBtn">
                                            <span id="submitBtnText">ENVIAR</span>
                                            <div id="submitBtnLoading" class="d-flex align-items-center" style="display: none;">
                                                <div class="spinner-border spinner-border-sm me-2" role="status">
                                                    <span class="visually-hidden">Carregando...</span>
                                                </div>
                                                Iniciando chat...
                                            </div>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </form>
                    </div>

                    <div id="chatInterface" class="chat-interface" style="display: none;">
                        <div class="chat-messages-area">
                            <div id="messagesContainer" class="chat-messages p-2" style="background-color: #ffffff;"></div>
                        </div>

                        <div id="evaluationContainer" class="evaluation-container" style="display: none;"></div>

                        <div id="chatInputContainer" class="chat-input-container border-top p-3 bg-white">
                            <div id="newSessionButtonContainer" class="text-center mb-3" style="display: none;">
                                <button type="button" class="btn btn-success btn-sm" id="startNewSessionBtn">
                                    <span id="newSessionBtnText" class="d-flex align-items-center justify-content-center gap-2">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                            <path d="M12 5v14"></path>
                                            <path d="M5 12h14"></path>
                                        </svg>
                                        Iniciar Nova Sessão
                                    </span>
                                    <div id="newSessionBtnLoading" class="d-flex align-items-center justify-content-center gap-2" style="display: none;">
                                        <div class="spinner-border spinner-border-sm" role="status">
                                            <span class="visually-hidden">Carregando...</span>
                                        </div>
                                        Iniciando...
                                    </div>
                                </button>
                            </div>

                            <form id="messageForm" class="d-flex align-items-center gap-2">
                                <div class="flex-grow-1">
                                    <input id="messageInput" type="text" name="message" class="form-control chat-input" placeholder="Digite sua mensagem..." autocomplete="off" required />
                                </div>
                                <button type="submit" class="btn-submit btn btn-primary chat-send-btn d-flex align-items-center justify-content-center" id="sendMessageBtn">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="22" y1="2" x2="11" y2="13"></line>
                                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="modal-footer justify-content-center py-2 bg-light rounded-bottom-4 border-0">
                    <small class="text-muted">
                        ❤️
                        <span class="ms-1">Desenvolvido pela <strong class="text-danger">Viva! Experiências</strong></span>
                    </small>
                </div>
            </div>
        </div>
    </div>

    <script src="chat.js"></script>
</body>
</html>
